name: Python Compatibility Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.14"
          python-version: ${{ matrix.python-version }}

      - name: Check if lockfile is up to date
        run: uv lock --check

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Test import
        run: |
          uv run python -c "import whisperx; print('Successfully imported whisperx')"

      - name: Run unit tests
        run: uv run pytest tests/ -m "not integration" -v

  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.14"
          python-version: "3.12"

      - name: Check if lockfile is up to date
        run: uv lock --check

      - name: Cache models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface/hub
            ~/.cache/torch/hub
          key: integration-models-tiny-en-v1

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run integration tests
        run: uv run pytest tests/ -m integration -v
